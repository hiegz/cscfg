unbindall
binddefaults

// Movement

bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "shift" "+sprint; r_cleardecals"
bind "ctrl" "+duck; r_cleardecals"

bind "mouse1" "+attack"
bind "mouse2" "+attack2"
bind "mouse3" "player_ping"
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"

bind "space" "+jump"

// Other

bind "e" "+use"
bind "r" "+reload"
bind "f" "+lookatweapon"
bind "g" "+drop"
bind "F3" "buymenu"
bind "t" "+spray_menu"
bind "m" "+teammenu"
bind "c" "+voicerecord"
bind "y" "messagemode"
bind "u" "messagemode2"
bind "`" "toggleconsole"
bind "tab" "+showscores"
bind "del" "voice_modenable_toggle"

// Weapons / Utility

bind "1" "slot1" // Primary weapon
bind "2" "slot2" // Secondary weapon
bind "3" "slot3"  // Knife
bind "4" "slot4"
bind "5" "slot5" // Bomb
bind "x" "slot6" // HE
bind "z" "slot7" // Flashbang
bind "q" "slot8" // Smoke
bind "b" "slot10" // Incendiary Grenade

// I have no idea

bind "'" "radio1"

// Practice

bind "F1" "sv_rethrow_last_grenade"
bind "F2" "ent_fire smokegrenade_projectile kill; stopsound"

bind "v" "noclip"

// Viewmodel

viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5
viewmodel_presetpos 2

// Crosshair

cl_crosshairstyle 4 // classic static
cl_crosshairsize 1
cl_crosshairthickness 1
cl_crosshair_drawoutline 0
cl_crosshairgap -4
cl_crosshairdot 0
cl_crosshair_t 0

cl_crosshaircolor 5
cl_crosshaircolor_r 255
cl_crosshaircolor_g 255
cl_crosshaircolor_b 255
cl_crosshairalpha 255

cl_crosshair_sniper_width "0"

// HUD / Radar

cl_drawhud 1
cl_hud_color 1
cl_hud_radar_scale 1
cl_radar_always_centered 1
cl_radar_icon_scale_min 0.6
cl_radar_rotate 1
cl_radar_scale 0.7
cl_radar_square_with_scoreboard 1

cl_teammate_colors_show 1

echo "autoexec loaded"
